##
## shell/nginx/nginx.conf — PRODUCTION ONLY
##
## In local dev, Vite server.proxy handles this instead (vite.config.ts).
## Same routing logic — Vite in dev, nginx in prod.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

   
    location /clientes/ {
        proxy_pass http://clientes/;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }
    location /facturas/ {
        proxy_pass http://facturas/;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }
  

    # Shell SPA
    location / { try_files $uri $uri/ /index.html; }

    # manifest.json — never cache
    location = /manifest.json {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Shell assets — cache forever
    location ~* \.(js|css|png|jpg|svg|woff2|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
         add_header Access-Control-Allow-Origin *;
    }
}
