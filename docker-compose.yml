services:
  mf-system-desing:
    container_name: mf-system-desing
    restart: unless-stopped
    build:
      context: ..
      dockerfile: mf-system-design/Dockerfile.local
    ports:
      - 5173:5173
    volumes:
      - ./src:/app/mf-system-design/src
    
      - /app/mf-system-design/src/node_modules
